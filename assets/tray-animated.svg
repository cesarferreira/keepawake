<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .steam { animation: rise 2s infinite ease-out; opacity: 0; }
    .steam-1 { animation-delay: 0s; }
    .steam-2 { animation-delay: 0.5s; }
    .steam-3 { animation-delay: 1s; }
    @keyframes rise {
      0% { transform: translateY(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-4px); opacity: 0; }
    }
  </style>

  <!-- Steam Lines -->
  <path class="steam steam-1" d="M8 4v3" />
  <path class="steam steam-2" d="M12 4v3" />
  <path class="steam steam-3" d="M16 4v3" />
  
  <!-- Cup Body -->
  <path d="M19 11H5v5a7 7 0 0 0 14 0v-5Z" />
  
  <!-- Cup Handle -->
  <path d="M19 13h1a2 2 0 0 1 0 4h-1" />
</svg>