<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient - warm dark tones -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#11998E"/>
    </linearGradient>
    <!-- Cup gradient -->
    <linearGradient id="cupGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <!-- Steam glow -->
    <linearGradient id="steamGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Subtle inner shadow for the cup -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
    <!-- Drop shadow for cup -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <!-- Glow for steam -->
    <filter id="steamGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded rectangle background (macOS style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Subtle highlight on top-left -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)" opacity="0"/>
  <ellipse cx="350" cy="300" rx="300" ry="250" fill="white" opacity="0.05"/>

  <!-- Cup group - centered -->
  <g filter="url(#dropShadow)" transform="translate(512, 520)">
    <!-- Cup body -->
    <path d="M-200,-120 L200,-120 L200,40 Q200,200 0,200 Q-200,200 -200,40 Z"
          fill="url(#cupGrad)" opacity="0.95"/>

    <!-- Cup rim highlight -->
    <path d="M-200,-120 L200,-120 L200,-100 L-200,-100 Z"
          fill="white" opacity="0.6" rx="4"/>

    <!-- Cup inner shadow/coffee -->
    <path d="M-180,-100 L180,-100 L180,30 Q180,180 0,180 Q-180,180 -180,30 Z"
          fill="#1a0e00" opacity="0.15"/>

    <!-- Handle -->
    <path d="M200,-80 Q300,-80 300,20 Q300,120 200,120"
          fill="none" stroke="url(#cupGrad)" stroke-width="40" stroke-linecap="round" opacity="0.95"/>

    <!-- Saucer / base plate -->
    <ellipse cx="0" cy="210" rx="240" ry="30" fill="white" opacity="0.3"/>
  </g>

  <!-- Steam lines -->
  <g filter="url(#steamGlow)" transform="translate(512, 520)">
    <!-- Left steam -->
    <path d="M-100,-160 Q-120,-220 -100,-280 Q-80,-340 -100,-400"
          fill="none" stroke="url(#steamGrad)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>

    <!-- Center steam -->
    <path d="M0,-160 Q20,-230 0,-300 Q-20,-370 0,-430"
          fill="none" stroke="url(#steamGrad)" stroke-width="18" stroke-linecap="round" opacity="0.8"/>

    <!-- Right steam -->
    <path d="M100,-160 Q80,-220 100,-280 Q120,-340 100,-400"
          fill="none" stroke="url(#steamGrad)" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
